<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>境界マップ（東京23区 / 東京湾一周）</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<style>
  :root { --safe-top: env(safe-area-inset-top, 0px); }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font-family: system-ui, -apple-system, "Hiragino Kaku Gothic ProN", sans-serif; }
  #map { position: absolute; inset: 0; z-index: 0; }

  /* 上部ステータス：チラ見で内/外が分かる最重要UI */
  #status {
    position: absolute; top: 0; left: 0; right: 0; z-index: 1000;
    padding: calc(10px + var(--safe-top)) 14px 12px;
    color: #fff; text-align: center;
    box-shadow: 0 2px 10px rgba(0,0,0,.3);
    transition: background-color .25s ease;
    background: #555;
  }
  #status.inside { background: #1f7a34; }   /* 区内：緑 */
  #status.outside { background: #b22222; }  /* 区外：赤 */
  #status.unknown { background: #555; }
  #statusMain { font-size: 30px; font-weight: 800; line-height: 1.15; letter-spacing: .02em; }
  #statusSub { font-size: 14px; opacity: .92; margin-top: 3px; min-height: 1em; }

  /* マップ切替セレクタ（ステータスバー内） */
  #mapSelect {
    margin-top: 8px; font-size: 14px; font-weight: 600;
    padding: 5px 10px; border-radius: 8px; border: none;
    background: rgba(255,255,255,.92); color: #222; cursor: pointer;
    max-width: 80%;
  }
  /* マップ固有の注意書き（例：フェリー必須） */
  #mapNote {
    margin-top: 6px; font-size: 12px; font-weight: 700;
    color: #fff3c4;
  }
  #mapNote:empty { display: none; }

  /* 現在地ボタン */
  #recenter {
    position: absolute; right: 14px; bottom: calc(20px + env(safe-area-inset-bottom, 0px));
    z-index: 1000; width: 60px; height: 60px; border-radius: 50%;
    border: none; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,.35);
    font-size: 26px; cursor: pointer;
  }
  #recenter:active { background: #eee; }

  .leaflet-container { background: #e8eef2; }
</style>
</head>
<body>
<div id="status" class="unknown">
  <div id="statusMain">現在地を取得中…</div>
  <div id="statusSub">位置情報を許可してください</div>
  <select id="mapSelect" title="一周マップを切り替え"></select>
  <div id="mapNote"></div>
</div>
<div id="map"></div>
<button id="recenter" title="現在地へ移動">◎</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
const TOKYO = [35.6895, 139.7];

const map = L.map("map", { zoomControl: true }).setView(TOKYO, 11);
L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19,
  attribution: '&copy; OpenStreetMap contributors',
}).addTo(map);

// ---- 内蔵 point-in-polygon（GeoJSON Polygon / MultiPolygon, 穴対応）----
function pointInRing(pt, ring) {
  let inside = false;
  const x = pt[0], y = pt[1];
  for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
    const xi = ring[i][0], yi = ring[i][1];
    const xj = ring[j][0], yj = ring[j][1];
    const intersect = (yi > y) !== (yj > y) &&
      x < ((xj - xi) * (y - yi)) / (yj - yi) + xi;
    if (intersect) inside = !inside;
  }
  return inside;
}
// even-odd ルール：全リング中、点を含むリング数が奇数なら内側。
// 飛び地（別リング）も穴も正しく扱える堅牢な方式。
function pointInFeature(pt, geom) {
  let count = 0;
  const rings = [];
  if (geom.type === "Polygon") geom.coordinates.forEach((r) => rings.push(r));
  else if (geom.type === "MultiPolygon") geom.coordinates.forEach((p) => p.forEach((r) => rings.push(r)));
  for (const r of rings) if (pointInRing(pt, r)) count++;
  return count % 2 === 1;
}

// ---- 一周マップの登録（ここに追加していけば増やせる）----
// regions: 色塗りする範囲(GeoJSON)。boundary: 太線で強調するルート/外周線。
//   boundary を省略すると regions の輪郭をルートとして太線描画する。
//   multiColor=true は各 feature が独自 color を持つ場合（23区）。
const MAPS = [
  {
    id: "tokyo23", label: "東京23区一周（境界ルート 約150km）",
    regionsUrl: "wards.geojson", boundaryUrl: "boundary.geojson",
    routeUrl: "tokyo23-route.geojson", hotspotsUrl: "tokyo23-route-hotspots.geojson",
    center: [35.6895, 139.7], zoom: 11, multiColor: true,
    insideLabel: (p) => `${p.name}（23区内）`, outsideLabel: "23区外",
    note: "🚲 赤線＝走行ルート / 黒破線＝区境 / 🟠オレンジ円＝線が密集＝短縮候補（例:羽田周辺）。",
  },
  {
    id: "yamanote", label: "山手線一周（約43km・試作）",
    regionsUrl: "yamanote.geojson", boundaryUrl: null,
    routeUrl: "yamanote-route.geojson", hotspotsUrl: "yamanote-route-hotspots.geojson",
    center: [35.68, 139.74], zoom: 12, multiColor: false, fillColor: "#7cb342",
    insideLabel: () => "山手線の内側", outsideLabel: "山手線の外側",
    note: "🚲 赤線＝線路沿いの走行ルート（道にスナップ・試作）/ 🟠＝密集(短縮候補)",
  },
  {
    id: "teganuma", label: "手賀沼一周（約20km・試作）",
    regionsUrl: "teganuma.geojson", boundaryUrl: null,
    routeUrl: "teganuma-route.geojson", hotspotsUrl: "teganuma-route-hotspots.geojson",
    center: [35.865, 140.04], zoom: 13, multiColor: false, fillColor: "#43a047",
    insideLabel: () => "手賀沼エリア内", outsideLabel: "手賀沼エリア外",
    note: "🚲 赤線＝湖岸沿いの走行ルート（道にスナップ・試作）/ 🟠＝密集(短縮候補)",
  },
  {
    id: "hamana", label: "ハマイチ（浜名湖一周 約65km・試作）",
    regionsUrl: "hamana.geojson", boundaryUrl: null,
    routeUrl: "hamana-route.geojson", hotspotsUrl: "hamana-route-hotspots.geojson",
    center: [34.74, 137.61], zoom: 11, multiColor: false, fillColor: "#0097a7",
    insideLabel: () => "浜名湖エリア内", outsideLabel: "浜名湖エリア外",
    note: "🚲 赤線＝湖岸沿いの走行ルート（道にスナップ・試作）/ 🟠＝密集(短縮候補)",
  },
  {
    id: "miura", label: "ミウライチ（三浦半島一周 約80km・試作）",
    regionsUrl: "miura.geojson", boundaryUrl: null,
    routeUrl: "miura-route.geojson", hotspotsUrl: "miura-route-hotspots.geojson",
    center: [35.22, 139.63], zoom: 12, multiColor: false, fillColor: "#5e35b1",
    insideLabel: () => "三浦半島エリア内", outsideLabel: "三浦半島エリア外",
    note: "🚲 赤線＝海岸沿いの走行ルート（道にスナップ・試作）/ 🟠＝密集(短縮候補)",
  },
  {
    id: "kasumigaura", label: "カスイチ（霞ヶ浦一周 約140km・試作）",
    regionsUrl: "kasumigaura.geojson", boundaryUrl: null,
    routeUrl: "kasumigaura-route.geojson", hotspotsUrl: "kasumigaura-route-hotspots.geojson",
    center: [36.03, 140.38], zoom: 11, multiColor: false, fillColor: "#00897b",
    insideLabel: () => "霞ヶ浦エリア内", outsideLabel: "霞ヶ浦エリア外",
    note: "🚲 赤線＝湖岸沿いの走行ルート（道にスナップ・試作）/ 🟠＝密集(短縮候補)",
  },
  {
    id: "fuji", label: "フジイチ（富士山一周 約150km・試作）",
    regionsUrl: "fuji.geojson", boundaryUrl: null,
    routeUrl: "fuji-route.geojson", hotspotsUrl: "fuji-route-hotspots.geojson",
    center: [35.36, 138.73], zoom: 11, multiColor: false, fillColor: "#2e7d32",
    insideLabel: () => "富士山エリア内", outsideLabel: "富士山エリア外",
    note: "🚲 赤線＝外周路の走行ルート（道にスナップ・試作）/ 🟠＝密集(短縮候補)",
  },
  {
    id: "biwako", label: "ビワイチ（琵琶湖一周 約200km・試作）",
    regionsUrl: "biwako.geojson", boundaryUrl: null,
    routeUrl: "biwako-route.geojson", hotspotsUrl: "biwako-route-hotspots.geojson",
    center: [35.28, 136.07], zoom: 10, multiColor: false, fillColor: "#0288d1",
    insideLabel: () => "琵琶湖エリア内", outsideLabel: "琵琶湖エリア外",
    note: "🚲 赤線＝湖岸沿いの走行ルート（道にスナップ・試作）/ 🟠＝密集(短縮候補)",
  },
  {
    id: "tokyobay", label: "東京湾一周（約200km・フェリー必須/試作）",
    regionsUrl: "tokyobay.geojson", boundaryUrl: null,
    center: [35.45, 139.85], zoom: 10, multiColor: false, fillColor: "#1e88e5",
    insideLabel: () => "東京湾エリア内", outsideLabel: "東京湾エリア外",
    note: "⚠ 湾口は東京湾フェリー(金谷↔久里浜)必須。自転車だけでは一周できません。",
  },
];

let activeMap = MAPS[0];   // 現在表示中のマップ設定
let regionFeatures = [];   // 内外判定に使う range の features
let mapLayers = [];        // 切替時に消すための Leaflet レイヤー
let lastPos = null;        // マップ切替時に直近位置で再判定するため

// ---- ステータス更新 ----
function setStatus(state, main, sub) {
  const el = document.getElementById("status");
  el.className = state;
  document.getElementById("statusMain").textContent = main;
  document.getElementById("statusSub").textContent = sub || "";
}
function findRegion(lng, lat) {
  for (const f of regionFeatures) {
    if (pointInFeature([lng, lat], f.geometry)) return f.properties;
  }
  return null;
}
function updateLocationStatus(lat, lng, accuracy) {
  lastPos = { lat, lng, accuracy };
  const p = findRegion(lng, lat);
  const acc = accuracy ? `±${Math.round(accuracy)}m` : "";
  if (p) {
    setStatus("inside", activeMap.insideLabel(p), `現在地 ${acc}`);
  } else {
    setStatus("outside", activeMap.outsideLabel, `現在地 ${acc}`);
  }
}

// ---- マップ読み込み / 切替 ----
function clearMapLayers() {
  mapLayers.forEach((l) => map.removeLayer(l));
  mapLayers = [];
}
function loadMap(cfg, { recenter = true } = {}) {
  activeMap = cfg;
  clearMapLayers();
  document.getElementById("mapNote").textContent = cfg.note || "";
  setStatus("unknown", "読み込み中…", cfg.label);

  const jobs = { regions: fetch(cfg.regionsUrl).then((r) => r.json()) };
  if (cfg.boundaryUrl) jobs.boundary = fetch(cfg.boundaryUrl).then((r) => r.json());
  if (cfg.routeUrl) jobs.route = fetch(cfg.routeUrl).then((r) => r.json());
  if (cfg.hotspotsUrl) jobs.hotspots = fetch(cfg.hotspotsUrl).then((r) => r.json());

  Promise.all(Object.entries(jobs).map(([k, p]) => p.then((v) => [k, v])))
    .then((entries) => {
    const { regions, boundary, route, hotspots } = Object.fromEntries(entries);
    regionFeatures = regions.features;
    const hasRoute = !!route;

    // 範囲を色塗り
    const regionLayer = L.geoJSON(regions, {
      style: (f) => cfg.multiColor
        ? { color: f.properties.color, weight: 1, fillColor: f.properties.color, fillOpacity: 0.28, opacity: 0.8 }
        : { color: "#111", weight: 4, fillColor: cfg.fillColor || f.properties.color || "#1e88e5", fillOpacity: 0.18, opacity: 0.85 },
      onEachFeature: (f, layer) => f.properties.name && layer.bindTooltip(f.properties.name, { sticky: true }),
    }).addTo(map);
    mapLayers.push(regionLayer);

    // 外周線/境界線（走行ルートがある時は細い破線にして赤線を目立たせる）
    if (boundary) {
      const bLayer = L.geoJSON(boundary, {
        style: hasRoute
          ? { color: "#111", weight: 2, fill: false, opacity: 0.6, dashArray: "4 4" }
          : { color: "#111", weight: 4, fill: false, opacity: 0.85 },
        interactive: false,
      }).addTo(map);
      mapLayers.push(bLayer);
    }

    // 線が密集している＝短縮候補の箇所をオレンジ円でハイライト（ルートの下に敷く）
    if (hotspots) {
      hotspots.features.forEach((f) => {
        const [lng, lat] = f.geometry.coordinates;
        const circle = L.circle([lat, lng], {
          radius: 320, color: "#ff6f00", weight: 2, fillColor: "#ff9800", fillOpacity: 0.3,
        }).bindTooltip(`線が密集 → 短縮候補（この付近に約${f.properties.len_km}km）`, { sticky: true }).addTo(map);
        mapLayers.push(circle);
      });
    }

    // 境界に最も近い走行ルート（実際の道）を赤い太線で強調
    if (route) {
      const rLayer = L.geoJSON(route, {
        style: { color: "#d81b60", weight: 5, fill: false, opacity: 0.9, lineCap: "round", lineJoin: "round" },
      }).bindTooltip(`${route.features[0].properties.name}（約${route.features[0].properties.distance_km}km）`, { sticky: true }).addTo(map);
      mapLayers.push(rLayer);
    }

    if (recenter) map.setView(cfg.center, cfg.zoom);
    // 既に位置がある場合は即再判定、無ければ位置取得待ち表示
    if (lastPos) updateLocationStatus(lastPos.lat, lastPos.lng, lastPos.accuracy);
    else setStatus("unknown", "現在地を取得中…", cfg.label);
  }).catch((e) => {
    setStatus("unknown", "データ読み込みエラー", String(e));
  });
}

// ---- セレクタ初期化 ----
(function initSelector() {
  const sel = document.getElementById("mapSelect");
  MAPS.forEach((m) => {
    const o = document.createElement("option");
    o.value = m.id; o.textContent = m.label; sel.appendChild(o);
  });
  sel.value = activeMap.id;
  sel.addEventListener("change", () => {
    const cfg = MAPS.find((m) => m.id === sel.value);
    if (cfg) loadMap(cfg, { recenter: true });
  });
})();

// 初回ロード（位置取得は1回だけ開始）
loadMap(activeMap, { recenter: true });
startGeolocation();

// ---- 現在地 ----
let meMarker, accCircle, hasCentered = false;
function startGeolocation() {
  if (!navigator.geolocation) {
    setStatus("unknown", "位置情報が使えません", "対応ブラウザで開いてください");
    return;
  }
  navigator.geolocation.watchPosition(
    (pos) => {
      const { latitude: lat, longitude: lng, accuracy } = pos.coords;
      if (!meMarker) {
        meMarker = L.circleMarker([lat, lng], {
          radius: 8, color: "#1565c0", fillColor: "#2196f3", fillOpacity: 1, weight: 3,
        }).addTo(map);
        accCircle = L.circle([lat, lng], { radius: accuracy, color: "#2196f3", weight: 1, fillOpacity: 0.08 }).addTo(map);
      } else {
        meMarker.setLatLng([lat, lng]);
        accCircle.setLatLng([lat, lng]).setRadius(accuracy);
      }
      if (!hasCentered) { map.setView([lat, lng], 14); hasCentered = true; }
      updateLocationStatus(lat, lng, accuracy);
    },
    (err) => {
      setStatus("unknown", "位置情報を取得できません",
        err.code === 1 ? "ブラウザの位置情報を許可してください" : err.message);
    },
    { enableHighAccuracy: true, maximumAge: 3000, timeout: 15000 }
  );
}

document.getElementById("recenter").addEventListener("click", () => {
  if (meMarker) map.setView(meMarker.getLatLng(), 15);
  else map.setView(TOKYO, 11);
});
</script>
</body>
</html>
